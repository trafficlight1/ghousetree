                { label: "Оперний",       labelEn: "Opera",        href: "https://pidsvitu.com/opera" },
                { label: "Політехнічний", labelEn: "Polytechnic",  href: "https://pidsvitu.com/polytechnic" },
                { label: "Потоцький",     labelEn: "Potocki",      href: "https://pidsvitu.com/potocki" },
                { label: "Надвисокий",    labelEn: "Ultra-high",   href: "https://pidsvitu.com/ultrahight" },
                { label: "Стометровий",   labelEn: "Hundred-metre", href: "https://pidsvitu.com/stomerovui" },
            ],
        },
        {
            label: "Інструменти", labelEn: "Tools",
            links: [
                { label: "Реєстр ліхтарів",                labelEn: "Lantern registry",          href: "https://list.pidsvitu.com/" },
                { label: "Земний покрив (Google Engine)",  labelEn: "Land cover (Google Engine)", href: "https://list.pidsvitu.com/google-engine.html" },
                { label: "Морфологічний аналіз",           labelEn: "Morphological analysis",    href: "https://deep.pidsvitu.com/" },
                { label: "Підсвіти WIKI",                  labelEn: "Pidsvity WIKI",             href: "https://wiki.pidsvitu.com/" },
                { label: "Перелік цінних ліхтарів Львова", labelEn: "List of valuable Lviv lanterns", href: "https://list.pidsvitu.com/" },
                { label: "Підсвітити ліхтар AI",           labelEn: "Light Up the Lantern AI",   href: "https://llm.pidsvitu.com/" },
            ],
        },
        {
            label: "Соцмережі", labelEn: "Social",
            links: [
                { label: "YouTube",   labelEn: "YouTube",   href: "https://www.youtube.com/@pidsvitu",         external: true },
                { label: "Instagram", labelEn: "Instagram", href: "https://www.instagram.com/pidsvitu_light/", external: true },
                { label: "TikTok",    labelEn: "TikTok",    href: "#",                                         external: true },
            ],
        },
    ];

    const lbl = (item) => (lang === "en" ? item.labelEn : item.label);

    function renderNav() {
        const left = document.getElementById("nav-left");
        const mobile = document.getElementById("mobile-menu-nav");
        left.innerHTML = ""; mobile.innerHTML = "";
        NAV_ITEMS.forEach((item) => {
            const a = document.createElement("a");
            a.href = item.href; a.className = "gm-nav__link"; a.textContent = lbl(item);
            left.appendChild(a);
            const m = document.createElement("a");
            m.href = item.href; m.className = "gm-mobile-menu__link"; m.textContent = lbl(item);
            m.addEventListener("click", closeMenu);
            mobile.appendChild(m);
        });
    }

    function renderFooter() {
        const wrap = document.getElementById("footer-left");
        wrap.innerHTML = "";
        FOOTER_GROUPS.forEach((group) => {
            const item = document.createElement("div");
            item.className = "gmf__nav-item";
            const trigger = document.createElement("span");
            trigger.className = "gmf__nav-trigger"; trigger.textContent = lbl(group);
            item.appendChild(trigger);
            const dd = document.createElement("div");
            dd.className = "gmf__dropdown";
            group.links.forEach((link) => {
                const a = document.createElement("a");
                a.href = link.href; a.className = "gmf__dropdown-link"; a.textContent = lbl(link);
                if (link.external) { a.target = "_blank"; a.rel = "noreferrer"; }
                dd.appendChild(a);
            });
            item.appendChild(dd); wrap.appendChild(item);
        });
    }

    function applyLang() {
        document.documentElement.lang = lang;
        document.title = STR[lang].title;
        const md = document.querySelector('meta[name="description"]');
        if (md) md.setAttribute("content", STR[lang].desc);
        const langBtn = document.getElementById("lang-btn");
        langBtn.textContent = STR[lang].langBtn;
        langBtn.setAttribute("aria-label", STR[lang].langAria);
        langBtn.setAttribute("title", STR[lang].langAria);
        renderNav(); renderFooter(); renderControls(); renderInfo();
    }

    document.getElementById("lang-btn").addEventListener("click", () => {
        lang = lang === "uk" ? "en" : "uk";
        try { window.localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
        applyLang();
    });

    /* ── Mobile hamburger menu ── */
    let menuOpen = false;
    const hamburger = document.getElementById("hamburger");
    const mobileMenu = document.getElementById("mobile-menu");
    function setHamburgerIcon() {
        document.getElementById("hamburger-icon").outerHTML = menuOpen
            ? '<svg id="hamburger-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>'
            : '<svg id="hamburger-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>';
    }
    function openMenu() {
        menuOpen = true; mobileMenu.classList.add("gm-mobile-menu--open");
        mobileMenu.setAttribute("aria-hidden", "false");
        hamburger.setAttribute("aria-expanded", "true");
        hamburger.setAttribute("aria-label", STR[lang].closeMenu); setHamburgerIcon();
    }
    function closeMenu() {
        menuOpen = false; mobileMenu.classList.remove("gm-mobile-menu--open");
        mobileMenu.setAttribute("aria-hidden", "true");
        hamburger.setAttribute("aria-expanded", "false");
        hamburger.setAttribute("aria-label", STR[lang].openMenu); setHamburgerIcon();
    }
    hamburger.addEventListener("click", () => (menuOpen ? closeMenu() : openMenu()));
    window.addEventListener("resize", () => { if (window.innerWidth >= 768 && menuOpen) closeMenu(); });

    const nav = document.getElementById("gm-nav");
    window.addEventListener("scroll", () => nav.classList.toggle("gm-nav--scrolled", window.scrollY > 10), { passive: true });

    /* ══════════════════ ШАРИ / LAYERS CONFIG ══════════════════ */
    // Required attribution lines (shown on relevant layers):
    const CREDIT_WORLDCOVER = "CC-BY-4.0 · ESA WorldCover 10m v200";
    const CREDIT_DYNAMICWORLD = {
        uk: "Набір даних створено для проєкту Dynamic World компанією Google у партнерстві з National Geographic Society та World Resources Institute.",
        en: "This dataset is produced for the Dynamic World Project by Google in partnership with National Geographic Society and the World Resources Institute.",
    };

    // ESA WorldCover official class palette
    const WC = {
        10: '#1A8718', 30: '#F0E64C', 40: '#F096FF', 50: '#FA0000',
        60: '#B4B4B4', 80: '#0064C8', 90: '#0096A0',
    };

    const LAYERS = [
        {
            id: 'land', name: 'Земний покрив', nameEn: 'Land cover',
            mapLayers: ['wc-fill'],
            desc: 'Класифікація земного покриву Львівщини за супутниковими даними ESA WorldCover (роздільність 10 м). Кожен піксель віднесено до одного з типів покриву — від лісу й трав до забудови та води.',
            descEn: 'Land-cover classification of the Lviv area from ESA WorldCover satellite data (10 m resolution). Each pixel is assigned to a cover type — from forest and grass to built-up and water.',
            legend: [
                { c: WC[10], l: 'Деревний покрив', le: 'Tree cover' },
                { c: WC[30], l: 'Трав’яний покрив', le: 'Grassland' },
                { c: WC[40], l: 'Орні землі', le: 'Cropland' },
                { c: WC[50], l: 'Забудова', le: 'Built-up' },
                { c: WC[60], l: 'Оголений / розріджений ґрунт', le: 'Bare / sparse vegetation' },
                { c: WC[80], l: 'Постійні водойми', le: 'Permanent water bodies' },
                { c: WC[90], l: 'Трав’янисті болота', le: 'Herbaceous wetland' },
            ],
            srcTag: 'ESA WorldCover',
            src: CREDIT_WORLDCOVER, srcEn: CREDIT_WORLDCOVER,
            note: CREDIT_DYNAMICWORLD.uk, noteEn: CREDIT_DYNAMICWORLD.en,
        },
        {
            id: 'build', name: 'Типи забудови', nameEn: 'Building types',
            mapLayers: ['bld-extrusion'],
            desc: 'Забудова Львова за категоріями висоти — від найнижчого приватного сектора й гаражів до радянських панельних масивів і сучасних висоток. Висота стовпчиків відповідає реальній висоті будівель.',
            descEn: 'Lviv’s built environment by height category — from the lowest private housing and garages to Soviet panel districts and modern high-rises. Column height matches the real building height.',
            legend: [
                { c: '#FFFFB2', l: '0–3 м · гаражі, господарські', le: '0–3 m · garages, outbuildings' },
                { c: '#FED976', l: '3–6 м · приватний сектор, садиби', le: '3–6 m · private housing' },
                { c: '#FEB24C', l: '6–10 м · стара передмісна забудова', le: '6–10 m · old suburban' },
                { c: '#FD8D3C', l: '10–15 м · центр (камʼяниці), хрущовки', le: '10–15 m · historic centre, low Soviet' },
                { c: '#F03B20', l: '15–21 м · радянська середньоповерхова', le: '15–21 m · mid-rise Soviet' },
                { c: '#BD0026', l: '21–30 м · панельні масиви, висотки', le: '21–30 m · panel districts, high-rises' },
            ],
            srcTag: 'Building heights',
            src: 'Похідний шар висот забудови на основі супутникових даних. Опрацьовано через Google Earth Engine.',
            srcEn: 'Derived building-height layer from satellite data. Processed via Google Earth Engine.',
            note: null, noteEn: null,
        },
        {
            id: 'urban', name: 'Нова забудова 2015–2024', nameEn: 'New urban 2015–2024',
            mapLayers: ['urban-fill'],
            desc: 'Ділянки, що змінилися із не-забудованих на забудовані у 2015–2024 роках. Яскравіші зони — щільніша нова забудова. Дані Dynamic World (Google).',
            descEn: 'Areas that changed from non-built to built between 2015 and 2024. Brighter zones mean denser new development. Dynamic World data (Google).',
            legend: [
                { c: '#00E5FF', l: 'Нова забудова 2015–2024', le: 'New urban 2015–2024' },
            ],
            srcTag: 'Dynamic World',
            src: CREDIT_DYNAMICWORLD.uk, srcEn: CREDIT_DYNAMICWORLD.en,
            note: null, noteEn: null,
        },
    ];

    const layerName = (l) => (lang === 'en' ? l.nameEn : l.name);
    let activeLayer = 'land';
    // Default + remembered opacity (0–1) per layer
    const layerOpacity = { land: 0.72, build: 0.92, urban: 1 };

    /* ── Layer switch buttons ── */
    function renderControls() {
        const box = document.getElementById('controls-box');
        box.innerHTML = '';
        LAYERS.forEach((layer) => {
            const btn = document.createElement('button');
            btn.className = 'layer-btn' + (layer.id === activeLayer ? ' active' : '');
            btn.dataset.id = layer.id;
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.style.color = layer.legend[layer.legend.length - 1].c;
            dot.style.background = layer.legend[layer.legend.length - 1].c;
            btn.appendChild(dot);
            const span = document.createElement('span');
            span.textContent = layerName(layer);
            btn.appendChild(span);
            btn.onclick = () => activate(layer.id);
            box.appendChild(btn);
        });
    }

    /* ── Info panel ── */
    function renderInfo() {
        const layer = LAYERS.find((l) => l.id === activeLayer);
        if (!layer) return;
        document.getElementById('info-title').textContent = layerName(layer);
        document.getElementById('info-desc').textContent = lang === 'en' ? layer.descEn : layer.desc;

        const leg = document.getElementById('info-legend');
        leg.innerHTML = '';
        layer.legend.forEach((it) => {
            const row = document.createElement('div');
            row.className = 'legend__item';
            const sw = document.createElement('span');
            sw.className = 'legend__swatch'; sw.style.background = it.c;
            const lab = document.createElement('span');
            lab.className = 'legend__label';
            lab.textContent = lang === 'en' ? it.le : it.l;
            row.appendChild(sw); row.appendChild(lab); leg.appendChild(row);
        });

        const src = document.getElementById('info-src');
        const note = lang === 'en' ? layer.noteEn : layer.note;
        src.innerHTML =
            '<span class="tag">' + layer.srcTag + '</span><br>' +
            (lang === 'en' ? layer.srcEn : layer.src) +
            (note ? '<br><br>' + note : '');

        syncOpacityUI();
    }

    document.getElementById('info-toggle').addEventListener('click', () => {
        document.getElementById('info-panel').classList.toggle('collapsed');
    });

    /* ── Opacity slider ── */
    const opRange = document.getElementById('opacity-range');
    const opVal = document.getElementById('opacity-val');
    function syncOpacityUI() {
        const v = layerOpacity[activeLayer];
        opRange.value = Math.round(v * 100);
        opVal.textContent = Math.round(v * 100) + '%';
        document.getElementById('opacity-label').textContent = STR[lang].opacity;
        opRange.setAttribute('aria-label', STR[lang].opacity);
    }
    function applyOpacity(v) {
        if (!map || !map.isStyleLoaded()) return;
        if (activeLayer === 'land' && map.getLayer('wc-fill')) {
            map.setPaintProperty('wc-fill', 'fill-opacity', v);
        } else if (activeLayer === 'build' && map.getLayer('bld-extrusion')) {
            map.setPaintProperty('bld-extrusion', 'fill-extrusion-opacity', v);
        } else if (activeLayer === 'urban' && map.getLayer('urban-fill')) {
            // preserve density gradient: scale the data-driven expression by the slider
            map.setPaintProperty('urban-fill', 'fill-opacity', ['*', v, URBAN_OPACITY]);
            map.setPaintProperty('urban-outline', 'line-opacity', v * 0.5);
        }
    }
    opRange.addEventListener('input', () => {
        const v = Number(opRange.value) / 100;
        layerOpacity[activeLayer] = v;
        opVal.textContent = opRange.value + '%';
        applyOpacity(v);
    });

    /* ══════════════════ КАРТА / MAP (MapLibre GL + OpenStreetMap) ══════════════════ */
    const isMobile = window.innerWidth < 768;
    const BASE = location.href.replace(/[^/]*(?:\?.*)?$/, '');
    const lvivBounds = [[23.86, 49.73], [24.17, 49.93]];

    // Dark OpenStreetMap raster base (OSM data, CARTO rendering) — dark theme, street/place names, free, no token.
    // Two layers: "nolabels" geometry at the bottom, "only_labels" placed above the data so names stay readable.
    const OSM_ATTR = '© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors';
    const osmTiles = (style) => [
        'https://a.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://b.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://c.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://d.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
    ];

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'osm-base':   { type: 'raster', tiles: osmTiles('dark_nolabels'),   tileSize: 256, maxzoom: 20, attribution: OSM_ATTR },
                'osm-labels': { type: 'raster', tiles: osmTiles('dark_only_labels'), tileSize: 256, maxzoom: 20 },
            },
            layers: [
                { id: 'bg', type: 'background', paint: { 'background-color': '#0a0a0a' } },
                { id: 'osm-base-layer', type: 'raster', source: 'osm-base' },
            ],
        },
        center: [24.0311, 49.8400],
        zoom: isMobile ? 11 : 12.2,
        pitch: 0, bearing: 0, antialias: true,
        maxBounds: lvivBounds, maxZoom: 17, minZoom: 10,
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-left');

    const loadingHint = document.getElementById('loading-hint');
    function showLoading(on) {
        loadingHint.textContent = STR[lang].loading;
        loadingHint.classList.toggle('visible', on);
    }

    // density-based opacity expression for the new-urban layer (scaled by the slider)
    const URBAN_OPACITY = ['interpolate', ['linear'], ['to-number', ['get', 'count']],
        1, 0.30, 50, 0.55, 500, 0.78, 2000, 0.9];

    map.on('load', () => {
        /* ── 1. WorldCover (vector tiles) ── */
        map.addSource('worldcover', {
            type: 'vector',
            tiles: [BASE + 'tiles/worldcover/{z}/{x}/{y}.pbf'],
            minzoom: 10, maxzoom: 14,
        });
        map.addLayer({
            id: 'wc-fill', type: 'fill', source: 'worldcover', 'source-layer': 'worldcover',
            layout: { visibility: 'visible' },
            paint: {
                'fill-color': ['match', ['get', 'class_id'],
                    10, WC[10], 30, WC[30], 40, WC[40], 50, WC[50], 60, WC[60], 80, WC[80], 90, WC[90],
                    '#555555'],
                'fill-opacity': 0.72,
                'fill-antialias': false,
            },
        });

        /* ── 2. Building types (3D extrusion) — above labels for the 3D view ── */
        map.addSource('buildings', { type: 'geojson', data: './google engine/lviv_building_types.geojson' });
        map.addLayer({
            id: 'bld-extrusion', type: 'fill-extrusion', source: 'buildings',
            filter: ['>', ['get', 'class'], 0],
            layout: { visibility: 'none' },
            paint: {
                'fill-extrusion-color': ['match', ['get', 'class'],
                    1, '#FFFFB2', 2, '#FED976', 3, '#FEB24C', 4, '#FD8D3C', 5, '#F03B20', 6, '#BD0026',
                    '#888888'],
                'fill-extrusion-height': ['*', ['to-number', ['get', 'built_height']], 2.0],
                'fill-extrusion-base': 0,
                'fill-extrusion-opacity': 0.92,
            },
        });

        /* ── 3. New urban 2015–2024 ── */
        map.addSource('newurban', { type: 'geojson', data: './google engine/lviv_new_urban_2015_2024.geojson' });
        map.addLayer({
            id: 'urban-fill', type: 'fill', source: 'newurban',
            layout: { visibility: 'none' },
            paint: { 'fill-color': '#00E5FF', 'fill-opacity': URBAN_OPACITY },
        });
        map.addLayer({
            id: 'urban-outline', type: 'line', source: 'newurban',
            layout: { visibility: 'none' },
            paint: { 'line-color': '#7CF5FF', 'line-width': 0.4, 'line-opacity': 0.5 },
        });

        // Street/place names on top, so they stay readable over the data layers.
        map.addLayer({ id: 'osm-labels-layer', type: 'raster', source: 'osm-labels' });

        // loading hint based on tile/source loading
        map.on('sourcedataloading', () => { if (activeLayer === 'land') showLoading(true); });
        map.on('idle', () => showLoading(false));

        applyLayerVisibility();
    });

    const ALL_MAP_LAYERS = ['wc-fill', 'bld-extrusion', 'urban-fill', 'urban-outline'];
    const LAYER_VISIBLE = {
        land: ['wc-fill'],
        build: ['bld-extrusion'],
        urban: ['urban-fill', 'urban-outline'],
    };

    function applyLayerVisibility() {
        const visible = LAYER_VISIBLE[activeLayer] || [];
        ALL_MAP_LAYERS.forEach((id) => {
            if (!map.getLayer(id)) return;
            map.setLayoutProperty(id, 'visibility', visible.includes(id) ? 'visible' : 'none');
        });
        applyOpacity(layerOpacity[activeLayer]);
        // 3D camera only for buildings
        const targetPitch = activeLayer === 'build' ? (isMobile ? 45 : 55) : 0;
        map.easeTo({ pitch: targetPitch, duration: 800 });
    }

    function activate(id) {
        if (id === activeLayer) return;
        activeLayer = id;
        document.querySelectorAll('.layer-btn').forEach((b) =>
            b.classList.toggle('active', b.dataset.id === id));
        renderInfo();
        if (map.isStyleLoaded()) applyLayerVisibility();
    }

    /* ── init ── */
    applyLang();
</script>

</body>
</html>
