    <style>
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Manrope', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        a { -webkit-tap-highlight-color: transparent; }

        /* ══════════════════ NAVBAR (gm-nav) ══════════════════ */
        .gm-nav {
          position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
          height: 83px; display: flex; align-items: center; justify-content: space-between;
          padding: 0 2rem;
          background: rgba(10, 10, 10, 0.55);
          backdrop-filter: blur(24px) saturate(160%);
          -webkit-backdrop-filter: blur(24px) saturate(160%);
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          transition: background 0.35s ease, border-color 0.35s ease;
        }
        .gm-nav--scrolled { background: rgba(14, 14, 14, 0.78); border-bottom-color: rgba(255, 255, 255, 0.12); }

        .gm-nav__left { display: flex; align-items: center; gap: 1.75rem; flex: 1; }
        .gm-nav__link {
          color: rgba(255, 255, 255, 0.88); font-size: 0.775rem; font-weight: 400;
          letter-spacing: 0.035em; text-decoration: none; white-space: nowrap;
          font-family: "Helvetica Neue", Arial, sans-serif; transition: color 0.2s ease;
        }
        .gm-nav__link:hover { color: #ffffff; }

        .gm-nav__center { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
        .gm-nav__logo { pointer-events: auto; text-decoration: none; display: flex; align-items: center; }
        .gm-nav__logo-img { height: 53px; width: auto; display: block; }

        .gm-nav__right { display: flex; align-items: center; gap: 0.25rem; flex: 1; justify-content: flex-end; }
        .gm-nav__icon-btn {
          background: none; border: none; color: rgba(255, 255, 255, 0.88); cursor: pointer;
          padding: 0.45rem; display: flex; align-items: center; justify-content: center;
          border-radius: 50%; transition: color 0.2s ease, background-color 0.2s ease;
        }
        .gm-nav__icon-btn:hover { color: #ffffff; background-color: rgba(255, 255, 255, 0.1); }

        .gm-nav__lang {
          font-family: "Helvetica Neue", Arial, sans-serif; font-size: 0.72rem; font-weight: 600;
          letter-spacing: 0.08em; min-width: 2.4rem; padding: 0.4rem 0.55rem; border-radius: 999px;
          border: 1px solid rgba(255, 255, 255, 0.25); line-height: 1;
        }
        .gm-nav__hamburger { display: none; }

        /* Mobile full-screen menu */
        .gm-mobile-menu {
          position: fixed; inset: 55px 0 0 0; z-index: 9998;
          background: rgba(8, 8, 8, 0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
          display: flex; flex-direction: column; justify-content: center; align-items: center;
          transform: translateY(-8px); opacity: 0; pointer-events: none;
          transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gm-mobile-menu--open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .gm-mobile-menu__link {
          color: rgba(255, 255, 255, 0.8); font-size: 1.65rem; font-weight: 300; letter-spacing: 0.06em;
          text-decoration: none; padding: 0.9rem 2rem; display: block; text-align: center;
          font-family: "Helvetica Neue", Arial, sans-serif; transition: color 0.2s ease;
        }
        .gm-mobile-menu__link:hover { color: #ffffff; }

        @media (max-width: 767px) {
          .gm-nav__left { display: none; }
          .gm-nav__hamburger { display: flex; }
          .gm-nav { height: 55px; }
          .gm-nav__logo-img { height: 35px; }
        }
        @media (max-width: 480px) { .gm-nav { padding: 0 1rem; } }

        /* ══════════════════ FOOTER (gmf) ══════════════════ */
        .gmf__overlay {
          position: fixed; bottom: 52px; left: 0; right: 0; background: #0a0a0a;
          height: 0; overflow: hidden; transition: height 0.15s ease; z-index: 1099; pointer-events: none;
        }
        .gmf {
          position: fixed; bottom: 0; left: 0; right: 0; z-index: 1100;
          width: 100%; height: 52px; display: flex; align-items: center; justify-content: space-between;
          padding: 0 2rem; background: #0a0a0a; border-top: 1px solid rgba(255, 255, 255, 0.08);
          font-family: "Helvetica Neue", Arial, sans-serif; box-sizing: border-box; overflow: visible;
        }
        .gmf::after {
          content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
          background: rgba(255, 255, 255, 0.9); transform: scaleX(0); transform-origin: left;
          transition: transform 0.25s ease; pointer-events: none;
        }
        .gmf:has(.gmf__nav-item:hover)::after { transform: scaleX(1); }

        .gmf__left { display: flex; align-items: center; gap: 0.1rem; flex: 1; min-width: 0; }
        .gmf__nav-item { position: relative; }
        .gmf__nav-trigger {
          color: rgba(255, 255, 255, 0.5); font-size: 0.72rem; font-weight: 400; letter-spacing: 0.03em;
          cursor: pointer; padding: 0.3rem 0.65rem; transition: color 0.15s ease; white-space: nowrap;
          user-select: none; display: block;
        }
        .gmf__nav-item:hover .gmf__nav-trigger { color: #ffffff; }

        .gmf__dropdown {
          position: absolute; bottom: calc(100% + 2px); left: 0; min-width: 150px; background: transparent;
          padding: 0.5rem 0 0.6rem; display: flex; flex-direction: column; opacity: 0; transform: translateY(4px);
          pointer-events: none; transition: opacity 0.15s ease, transform 0.15s ease; z-index: 1100;
        }
        .gmf__nav-item:hover .gmf__dropdown { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .gmf__dropdown-link {
          color: rgba(255, 255, 255, 0.45); font-size: 0.72rem; font-weight: 400; letter-spacing: 0.03em;
          text-decoration: none; padding: 0.3rem 0; white-space: nowrap; transition: color 0.15s ease; line-height: 1.6;
        }
        .gmf__dropdown-link:hover { color: #ffffff; }

        .gmf__center { position: absolute; left: 50%; transform: translateX(-50%); }
        .gmf__email-cta {
          color: rgba(255, 255, 255, 0.5); font-size: 0.72rem; letter-spacing: 0.03em;
          text-decoration: none; white-space: nowrap; transition: color 0.15s ease;
        }
        .gmf__email-cta:hover { color: #ffffff; }

        .gmf__right { display: flex; align-items: center; gap: 1.25rem; flex: 1; justify-content: flex-end; }
        .gmf__logo-link { display: flex; align-items: center; text-decoration: none; }
        .gmf__logo { height: 20px; width: auto; display: block; opacity: 0.7; transition: opacity 0.15s ease; }
        .gmf__logo-link:hover .gmf__logo { opacity: 1; }
        .gmf__partners { display: flex; align-items: center; gap: 1rem; }
        .gmf__partner {
          height: 20px; width: auto; display: block; opacity: 0.4;
          filter: brightness(0) invert(1); transition: opacity 0.15s ease;
        }
        .gmf__partner:hover { opacity: 0.85; }

        @media (max-width: 900px) {
          .gmf { padding: 0 1.25rem; }
          .gmf__partners { gap: 0.65rem; }
        }
        @media (max-width: 640px) {
          .gmf__center, .gmf__email-cta { display: none; }
          .gmf__nav-trigger { padding: 0.3rem 0.4rem; font-size: 0.68rem; }
          .gmf__right { gap: 0.75rem; }
        }
        @media (max-width: 420px) {
          .gmf__nav-item:nth-child(n+3) { display: none; }
        }

        /* ══════════════════ LAYER SWITCH PANEL (glass) ══════════════════ */
        .ui-wrapper {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; width: 100%;
            z-index: 20; pointer-events: none;
        }
        .controls {
            position: relative;
            background: rgba(16, 16, 18, 0.55);
            backdrop-filter: blur(22px) saturate(160%);
            -webkit-backdrop-filter: blur(22px) saturate(160%);
            padding: 14px 16px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
            width: fit-content; max-width: 95%;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; pointer-events: auto;
        }
        .layer-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.22); color: #fff;
            padding: 10px 18px; border-radius: 22px; cursor: pointer; font-size: 13px;
            font-family: 'Manrope', sans-serif; font-weight: 500; letter-spacing: 0.02em;
            text-transform: uppercase; transition: all 0.25s ease; min-width: 80px;
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .layer-btn .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 8px currentColor; }
        .layer-btn:hover { border-color: rgba(255, 255, 255, 0.7); box-shadow: 0 0 14px rgba(255, 255, 255, 0.12); }
        .layer-btn.active { background: #fff; color: #000; font-weight: 700; box-shadow: 0 0 18px rgba(255, 255, 255, 0.4); border-color: #fff; }

        /* ══════════════════ INFO PANEL (glass) ══════════════════ */
        .info-panel {
            position: fixed; top: 103px; right: 20px; z-index: 30; width: 320px; max-width: calc(100vw - 40px);
            background: rgba(16, 16, 18, 0.55);
            backdrop-filter: blur(26px) saturate(160%);
            -webkit-backdrop-filter: blur(26px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 22px; box-shadow: 0 12px 50px rgba(0, 0, 0, 0.5);
            color: #fff; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }
        .info-panel__head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 12px; gap: 10px;
        }
        .info-panel__title { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.01em; line-height: 1.2; }
        .info-panel__toggle {
            background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; padding: 4px;
            display: flex; align-items: center; transition: color 0.2s ease, transform 0.3s ease;
        }
        .info-panel__toggle:hover { color: #fff; }
        .info-panel__body { padding: 0 20px 18px; max-height: calc(100vh - 320px); overflow-y: auto; }
        .info-panel__desc { font-size: 0.82rem; line-height: 1.55; color: rgba(255, 255, 255, 0.82); margin: 0 0 14px; }

        /* Opacity slider */
        .opacity-ctl { margin: 0 0 16px; }
        .opacity-ctl__row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .opacity-ctl__label { font-size: 0.7rem; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        .opacity-ctl__val { font-size: 0.72rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
        .opacity-range {
            -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 4px;
            background: rgba(255, 255, 255, 0.18); outline: none; cursor: pointer; margin: 0;
        }
        .opacity-range::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.6); border: none; cursor: pointer;
        }
        .opacity-range::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%; background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6); border: none; cursor: pointer;
        }

        .basemap-ctl { margin: 0 0 16px; }
        .basemap-ctl__track { display: flex; align-items: center; gap: 10px; }
        .basemap-ctl__end { font-size: 0.62rem; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.55); flex: 0 0 auto; }
        .basemap-range {
            background: linear-gradient(90deg, #0a0a0a 0%, #777 50%, #f2f2f2 100%);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .legend { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .legend__item { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: rgba(255,255,255,0.88); }
        .legend__swatch { width: 16px; height: 16px; border-radius: 4px; flex: 0 0 auto; border: 1px solid rgba(255,255,255,0.18); }
        .legend__label b { font-weight: 700; color: #fff; }

        .info-panel__src {
            border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 12px; margin-top: 4px;
            font-size: 0.68rem; line-height: 1.5; color: rgba(255, 255, 255, 0.5);
        }
        .info-panel__src .tag {
            display: inline-block; font-family: "Helvetica Neue", Arial, sans-serif; font-weight: 600;
            letter-spacing: 0.04em; color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px; padding: 2px 9px; margin-bottom: 7px; font-size: 0.64rem;
        }
        .info-panel__src a { color: rgba(255,255,255,0.7); }

        .info-panel.collapsed .info-panel__body { display: none; }
        .info-panel.collapsed .info-panel__toggle { transform: rotate(180deg); }

        /* Loading hint */
        .loading-hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25;
            color: rgba(255,255,255,0.85); font-size: 0.85rem; letter-spacing: 0.04em; text-align: center;
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
            background: rgba(16,16,18,0.55); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 12px 20px;
        }
        .loading-hint.visible { opacity: 1; }

        /* ══════════════════ NTL VARIANT SEGMENTED CONTROL + CHART ══════════════════ */
        .seg { display: flex; gap: 4px; margin: 0 0 14px; flex-wrap: wrap; }
        .seg__btn {
            flex: 1 1 auto; min-width: 60px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.16); color: rgba(255,255,255,0.78);
            font-family: 'Manrope', sans-serif; font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.02em; padding: 7px 6px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .seg__btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
        .seg__btn.active { background: #fff; color: #000; border-color: #fff; }
        .ntl-chart { margin: 0 0 16px; }
        .ntl-chart__title { font-size: 0.66rem; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin: 0 0 8px; }
        .ntl-chart svg { display: block; width: 100%; height: auto; overflow: visible; }
        .ntl-chart__cap { font-size: 0.64rem; color: rgba(255,255,255,0.45); margin: 6px 0 0; line-height: 1.4; }

        @media (max-width: 767px) {
            /* Footer is hidden on mobile — not enough vertical room. */
            .gmf, .gmf__overlay { display: none; }
            /* The floating layer-switch panel doesn't fit, so the buttons move into the info panel. */
            .ui-wrapper { display: none; }
            #controls-slot { margin: 0 0 14px; }
            #controls-slot .controls {
                position: static; background: none; backdrop-filter: none; -webkit-backdrop-filter: none;
                padding: 0; border: none; box-shadow: none; border-radius: 0;
                width: 100%; max-width: 100%;
                display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            }
            .layer-btn { width: 100%; font-size: 11px; padding: 9px 4px; border-radius: 14px; min-width: auto; justify-content: center; }
            .layer-btn .dot { display: none; }
            .info-panel {
                top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100%;
                border-radius: 22px 22px 0 0; border-bottom: none;
            }
            .info-panel__body { max-height: 42vh; }
            .info-panel.collapsed { transform: translateY(0); }
        }
    </style>
</head>
<body>

        t.className = 'ntl-chart__title';
        t.textContent = lang === 'en' ? 'Mean radiance by month · 2021' : 'Середня радіація по місяцях · 2021';
        chart.appendChild(t);
        chart.insertAdjacentHTML('beforeend', buildMonthlyChart());
        const cap = document.createElement('p');
        cap.className = 'ntl-chart__cap';
        cap.textContent = lang === 'en'
            ? 'Lighting peaks in winter (Feb) and drops in summer; June has no clear-sky data.'
            : 'Освітлення зростає взимку (лютий) і падає влітку; за червень немає безхмарних даних.';
        chart.appendChild(cap);
        box.appendChild(chart);
    }

    function buildMonthlyChart() {
        const W = 280, H = 96, pad = 4, baseY = H - 16;
        const vals = NTL_MONTHLY;
        const max = Math.max(...vals.filter((v) => v != null));
        const n = vals.length;
        const bw = (W - pad * 2) / n;
        const months = lang === 'en' ? MONTHS_EN : MONTHS_UK;
        let bars = '';
        vals.forEach((v, i) => {
            const x = pad + i * bw;
            if (v == null) {
                bars += `<rect x="${(x + 2).toFixed(1)}" y="${baseY - 6}" width="${(bw - 4).toFixed(1)}" height="6" rx="2" fill="rgba(255,255,255,0.12)"/>`;
            } else {
                const h = ((v / max) * (baseY - 6));
                const col = i === 1 ? '#fcfdbf' : (i === 11 ? '#fe9f6d' : '#de4968');
                bars += `<rect x="${(x + 2).toFixed(1)}" y="${(baseY - h).toFixed(1)}" width="${(bw - 4).toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${col}"/>`;
            }
            bars += `<text x="${(x + bw / 2).toFixed(1)}" y="${H - 3}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)" font-family="Manrope,sans-serif">${months[i]}</text>`;
        });
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img">` +
               `<line x1="${pad}" y1="${baseY}" x2="${W - pad}" y2="${baseY}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>` +
               bars + `</svg>`;
    }

    function setNtlVariant(id) {
        if (id === ntlVariant) return;
        ntlVariant = id;
        document.querySelectorAll('#info-extra .seg__btn').forEach((b, i) =>
            b.classList.toggle('active', NTL_VARIANTS[i].id === id));
        applyNtlVariantVisibility();
        applyOpacity(layerOpacity.ntl);
    }

    const NTL_MAP_LAYERS = { points: 'ntl-points', winter: 'ntl-winter', summer: 'ntl-summer', '2013': 'ntl-2013' };
    function applyNtlVariantVisibility() {
        if (!map) return;
        Object.entries(NTL_MAP_LAYERS).forEach(([vid, lid]) => {
            if (!map.getLayer(lid)) return;
            const on = (activeLayer === 'ntl' && vid === ntlVariant);
            map.setLayoutProperty(lid, 'visibility', on ? 'visible' : 'none');
        });
    }

    document.getElementById('info-toggle').addEventListener('click', () => {
        document.getElementById('info-panel').classList.toggle('collapsed');
    });

    /* ── Opacity slider ── */
    const opRange = document.getElementById('opacity-range');
    const opVal = document.getElementById('opacity-val');
    function syncOpacityUI() {
        const v = layerOpacity[activeLayer];
        opRange.value = Math.round(v * 100);
        opVal.textContent = Math.round(v * 100) + '%';
        document.getElementById('opacity-label').textContent = STR[lang].opacity;
        opRange.setAttribute('aria-label', STR[lang].opacity);
    }
    function applyOpacity(v) {
        if (!map || !map.isStyleLoaded()) return;
        if (activeLayer === 'land' && map.getLayer('wc-fill')) {
            map.setPaintProperty('wc-fill', 'fill-opacity', v);
        } else if (activeLayer === 'build' && map.getLayer('bld-extrusion')) {
            map.setPaintProperty('bld-extrusion', 'fill-extrusion-opacity', v);
        } else if (activeLayer === 'urban' && map.getLayer('urban-fill')) {
            // preserve density gradient: scale the data-driven expression by the slider
            map.setPaintProperty('urban-fill', 'fill-opacity', ['*', v, URBAN_OPACITY]);
            map.setPaintProperty('urban-outline', 'line-opacity', v * 0.5);
        } else if (activeLayer === 'ntl') {
            if (ntlVariant === 'points' && map.getLayer('ntl-points')) {
                map.setPaintProperty('ntl-points', 'circle-opacity', v);
            } else {
                const lid = NTL_MAP_LAYERS[ntlVariant];
                if (lid && map.getLayer(lid)) map.setPaintProperty(lid, 'raster-opacity', v);
            }
        } else if (activeLayer === 'builtsurface' && map.getLayer('builtsurface-raster')) {
            map.setPaintProperty('builtsurface-raster', 'raster-opacity', v);
        } else if (activeLayer === 'smod' && map.getLayer('smod-raster')) {
            map.setPaintProperty('smod-raster', 'raster-opacity', v);
        } else if (activeLayer === 'ndvi' && map.getLayer('ndvi-raster')) {
            map.setPaintProperty('ndvi-raster', 'raster-opacity', v);
        }
    }
    opRange.addEventListener('input', () => {
        const v = Number(opRange.value) / 100;
        layerOpacity[activeLayer] = v;
        opVal.textContent = opRange.value + '%';
        applyOpacity(v);
    });

    /* ── Basemap tone slider (dark ↔ light) ── */
    const BASEMAP_KEY = 'pidsvitu-basemap';
    let basemapTone = 0; // 0 = dark, 1 = light
    try {
        const stored = parseFloat(window.localStorage.getItem(BASEMAP_KEY));
        if (!isNaN(stored)) basemapTone = Math.min(1, Math.max(0, stored));
    } catch (e) {}

    const bmRange = document.getElementById('basemap-range');
    bmRange.value = Math.round(basemapTone * 100);

    // blend the empty-canvas background colour between dark (#0a0a0a) and light (#ededed)
    const lerp = (a, b, t) => Math.round(a + (b - a) * t);
    function bgFor(t) {
        const d = 10, l = 237, v = lerp(d, l, t);
        return 'rgb(' + v + ',' + v + ',' + v + ')';
    }
    function applyBasemap(t) {
        if (!map || !map.getLayer('osm-base-layer')) return;
        const darkOp = 1 - t;
        map.setPaintProperty('osm-base-layer', 'raster-opacity', darkOp);
        map.setPaintProperty('bg', 'background-color', bgFor(t));
        if (map.getLayer('osm-labels-layer')) {
            map.setPaintProperty('osm-labels-layer', 'raster-opacity', darkOp);
        }
    }
    function syncBasemapUI() {
        document.getElementById('basemap-label').textContent = STR[lang].basemap;
        document.getElementById('basemap-dark').textContent = STR[lang].basemapDark;
        document.getElementById('basemap-light').textContent = STR[lang].basemapLight;
        bmRange.setAttribute('aria-label', STR[lang].basemap);
    }
    syncBasemapUI();
    bmRange.addEventListener('input', () => {
        basemapTone = Number(bmRange.value) / 100;
        applyBasemap(basemapTone);
        try { window.localStorage.setItem(BASEMAP_KEY, String(basemapTone)); } catch (e) {}
    });

    /* ══════════════════ КАРТА / MAP (MapLibre GL + OpenStreetMap) ══════════════════ */
    const isMobile = window.innerWidth < 768;
    const BASE = location.href.replace(/[^/]*(?:\?.*)?$/, '');
    const lvivBounds = [[23.85, 49.73], [24.19, 49.94]];

    // WGS84 corner coordinates (TL, TR, BR, BL) for the raster PNG overlays in /new/png.
    const IMG_COORDS = {
        ntl:           [[23.917644, 49.923872], [24.124257, 49.923872], [24.124257, 49.766667], [23.917644, 49.766667]],
        built_surface: [[23.872460, 49.920079], [24.167948, 49.920079], [24.167948, 49.769279], [23.872460, 49.769279]],
        smod:          [[23.867640, 49.928669], [24.182448, 49.928669], [24.182448, 49.766187], [23.867640, 49.766187]],
        ndvi:          [[23.919980, 49.920009], [24.120035, 49.920009], [24.120035, 49.769991], [23.919980, 49.769991]],
    };

    // Dark OpenStreetMap raster base (OSM data, CARTO rendering) — dark theme, street/place names, free, no token.
    // Two layers: "nolabels" geometry at the bottom, "only_labels" placed above the data so names stay readable.
    const OSM_ATTR = '© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors';
    const osmTiles = (style) => [
        'https://a.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://b.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://c.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
        'https://d.basemaps.cartocdn.com/' + style + '/{z}/{x}/{y}.png',
    ];

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'osm-base-light':   { type: 'raster', tiles: osmTiles('light_nolabels'),   tileSize: 256, maxzoom: 20, attribution: OSM_ATTR },
                'osm-labels-light': { type: 'raster', tiles: osmTiles('light_only_labels'), tileSize: 256, maxzoom: 20 },
                'osm-base':   { type: 'raster', tiles: osmTiles('dark_nolabels'),   tileSize: 256, maxzoom: 20, attribution: OSM_ATTR },
                'osm-labels': { type: 'raster', tiles: osmTiles('dark_only_labels'), tileSize: 256, maxzoom: 20 },
            },
            layers: [
                { id: 'bg', type: 'background', paint: { 'background-color': '#0a0a0a' } },
                { id: 'osm-base-light-layer', type: 'raster', source: 'osm-base-light' },
                { id: 'osm-base-layer', type: 'raster', source: 'osm-base', paint: { 'raster-opacity': 1 } },
            ],
        },
        center: [24.0311, 49.8400],
        zoom: isMobile ? 11 : 12.2,
        pitch: 0, bearing: 0, antialias: true,
        maxBounds: lvivBounds, maxZoom: 17, minZoom: 10,
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-left');

    const loadingHint = document.getElementById('loading-hint');
    function showLoading(on) {
        loadingHint.textContent = STR[lang].loading;
        loadingHint.classList.toggle('visible', on);
    }

    // density-based opacity expression for the new-urban layer (scaled by the slider)
    const URBAN_OPACITY = ['interpolate', ['linear'], ['to-number', ['get', 'count']],
        1, 0.30, 50, 0.55, 500, 0.78, 2000, 0.9];

    map.on('load', () => {
        /* ── 1. WorldCover (vector tiles) ── */
        map.addSource('worldcover', {
            type: 'vector',
            tiles: [BASE + 'tiles/worldcover/{z}/{x}/{y}.pbf'],
            minzoom: 10, maxzoom: 14,
        });
        map.addLayer({
            id: 'wc-fill', type: 'fill', source: 'worldcover', 'source-layer': 'worldcover',
            layout: { visibility: 'visible' },
            paint: {
                'fill-color': ['match', ['get', 'class_id'],
                    10, WC[10], 30, WC[30], 40, WC[40], 50, WC[50], 60, WC[60], 80, WC[80], 90, WC[90],
                    '#555555'],
                'fill-opacity': 0.72,
                'fill-antialias': false,
            },
        });

        /* ── 2. Building types (3D extrusion) — above labels for the 3D view ── */
        map.addSource('buildings', { type: 'geojson', data: './google engine/lviv_building_types.geojson' });
        map.addLayer({
            id: 'bld-extrusion', type: 'fill-extrusion', source: 'buildings',
            filter: ['>', ['get', 'class'], 0],
            layout: { visibility: 'none' },
            paint: {
                'fill-extrusion-color': ['match', ['get', 'class'],
                    1, '#FFFFB2', 2, '#FED976', 3, '#FEB24C', 4, '#FD8D3C', 5, '#F03B20', 6, '#BD0026',
                    '#888888'],
                'fill-extrusion-height': ['*', ['to-number', ['get', 'built_height']], 2.0],
                'fill-extrusion-base': 0,
                'fill-extrusion-opacity': 0.92,
            },
        });

        /* ── 3. New urban 2015–2024 ── */
        map.addSource('newurban', { type: 'geojson', data: './google engine/lviv_new_urban_2015_2024.geojson' });
        map.addLayer({
            id: 'urban-fill', type: 'fill', source: 'newurban',
            layout: { visibility: 'none' },
            paint: { 'fill-color': '#00E5FF', 'fill-opacity': URBAN_OPACITY },
        });
        map.addLayer({
            id: 'urban-outline', type: 'line', source: 'newurban',
            layout: { visibility: 'none' },
            paint: { 'line-color': '#7CF5FF', 'line-width': 0.4, 'line-opacity': 0.5 },
        });

        /* ── 4. NDVI (Sentinel-2) raster overlay ── */
        map.addSource('ndvi', { type: 'image', url: BASE + 'new/png/ndvi.png', coordinates: IMG_COORDS.ndvi });
        map.addLayer({
            id: 'ndvi-raster', type: 'raster', source: 'ndvi',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.88, 'raster-resampling': 'linear', 'raster-fade-duration': 0 },
        });

        /* ── 5. GHSL built surface raster overlay ── */
        map.addSource('builtsurface', { type: 'image', url: BASE + 'new/png/built_surface.png', coordinates: IMG_COORDS.built_surface });
        map.addLayer({
            id: 'builtsurface-raster', type: 'raster', source: 'builtsurface',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.85, 'raster-resampling': 'nearest', 'raster-fade-duration': 0 },
        });

        /* ── 6. GHSL degree of urbanisation (SMOD) raster overlay ── */
        map.addSource('smod', { type: 'image', url: BASE + 'new/png/smod.png', coordinates: IMG_COORDS.smod });
        map.addLayer({
            id: 'smod-raster', type: 'raster', source: 'smod',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.78, 'raster-resampling': 'nearest', 'raster-fade-duration': 0 },
        });

        /* ── 7. NASA Black Marble nighttime lights ── */
        // Seasonal / January raster composites (magma)
        map.addSource('ntl-winter', { type: 'image', url: BASE + 'new/png/ntl_winter.png', coordinates: IMG_COORDS.ntl });
        map.addSource('ntl-summer', { type: 'image', url: BASE + 'new/png/ntl_summer.png', coordinates: IMG_COORDS.ntl });
        map.addSource('ntl-2013',   { type: 'image', url: BASE + 'new/png/ntl_2013jan.png', coordinates: IMG_COORDS.ntl });
        ['winter', 'summer', '2013'].forEach((v) => {
            map.addLayer({
                id: 'ntl-' + v, type: 'raster', source: 'ntl-' + v,
                layout: { visibility: 'none' },
                paint: { 'raster-opacity': 1, 'raster-resampling': 'linear', 'raster-fade-duration': 0 },
            });
        });
        // 2021 annual points (graduated magma circles)
        map.addSource('ntl-points-src', { type: 'geojson', data: BASE + 'new/blackmarble_lviv_2021_points.geojson' });
        map.addLayer({
            id: 'ntl-points', type: 'circle', source: 'ntl-points-src',
            layout: { visibility: 'none' },
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['zoom'],
                    10, 3, 12, 6, 14, 11, 16, 20],
                'circle-color': ['interpolate', ['linear'], ['to-number', ['get', 'NTL']],
                    0.1, '#3b0f70', 1, '#8c2981', 3, '#de4968', 6, '#fe9f6d', 12, '#fcfdbf'],
                'circle-opacity': 1,
                'circle-blur': 0.35,
            },
        });

        // Street/place names on top, so they stay readable over the data layers.
        map.addLayer({ id: 'osm-labels-light-layer', type: 'raster', source: 'osm-labels-light' });
        map.addLayer({ id: 'osm-labels-layer', type: 'raster', source: 'osm-labels', paint: { 'raster-opacity': 1 } });
        applyBasemap(basemapTone);

        // loading hint based on tile/source loading
        map.on('sourcedataloading', () => { if (activeLayer === 'land') showLoading(true); });
        map.on('idle', () => showLoading(false));

        applyLayerVisibility();
    });

    const ALL_MAP_LAYERS = ['wc-fill', 'bld-extrusion', 'urban-fill', 'urban-outline',
        'ndvi-raster', 'builtsurface-raster', 'smod-raster',
        'ntl-winter', 'ntl-summer', 'ntl-2013', 'ntl-points'];
    const LAYER_VISIBLE = {
        land: ['wc-fill'],
        build: ['bld-extrusion'],
        urban: ['urban-fill', 'urban-outline'],
        ntl: [],   // handled per-variant by applyNtlVariantVisibility()
        builtsurface: ['builtsurface-raster'],
        smod: ['smod-raster'],
        ndvi: ['ndvi-raster'],
    };

    function applyLayerVisibility() {
        const visible = LAYER_VISIBLE[activeLayer] || [];
        ALL_MAP_LAYERS.forEach((id) => {
            if (!map.getLayer(id)) return;
            map.setLayoutProperty(id, 'visibility', visible.includes(id) ? 'visible' : 'none');
        });
        if (activeLayer === 'ntl') applyNtlVariantVisibility();
        applyOpacity(layerOpacity[activeLayer]);
        // 3D camera only for buildings
        const targetPitch = activeLayer === 'build' ? (isMobile ? 45 : 55) : 0;
        map.easeTo({ pitch: targetPitch, duration: 800 });
    }

    // Apply the visibility for the current activeLayer as soon as the map is ready.
    // If the style/tiles are still loading, a click used to be dropped silently —
    // instead we queue it and re-apply on the next 'idle', so the latest choice always wins.
    let visibilityQueued = false;
    function applyLayerVisibilityWhenReady() {
        if (map.isStyleLoaded()) {
            applyLayerVisibility();
        } else if (!visibilityQueued) {
            visibilityQueued = true;
            map.once('idle', () => {
                visibilityQueued = false;
                applyLayerVisibilityWhenReady();
            });
        }
    }

    function activate(id) {
        if (id === activeLayer) return;
        activeLayer = id;
        document.querySelectorAll('.layer-btn').forEach((b) =>
            b.classList.toggle('active', b.dataset.id === id));
        renderInfo();
        applyLayerVisibilityWhenReady();
    }

    /* ── On mobile the footer is hidden and the floating layer panel doesn't fit,
          so move the layer buttons into the info panel; restore them on desktop. ── */
    const controlsBox = document.getElementById('controls-box');
    const controlsSlot = document.getElementById('controls-slot');
    const uiWrapper = document.querySelector('.ui-wrapper');
    const mqMobile = window.matchMedia('(max-width: 767px)');
    function placeControls() {
        const target = mqMobile.matches ? controlsSlot : uiWrapper;
        if (controlsBox.parentElement !== target) target.appendChild(controlsBox);
    }
    placeControls();
    mqMobile.addEventListener('change', placeControls);

    /* ── init ── */
    applyLang();
</script>

</body>
</html>
